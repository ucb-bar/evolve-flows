# AlphaEvolve config for ChampSim L2C prefetcher evolution (simplified).
# Uses Google's AlphaEvolve cloud API as the search backend.
# Evaluation is handled by ChiaEvaluator (same pipeline as AdaEvolve).
#
# Usage:  python run_flow.py --config config_alphaevolve.yaml

max_iterations: 10        # maps to max_programs_evaluated in the backend
log_level: "INFO"
file_suffix: ".cc"

search:
  type: "alphaevolve"
  # Islands / MAP-Elites are managed server-side by AlphaEvolve;
  # no client-side island config (cf. search.database.num_islands in AdaEvolve).

# AlphaEvolve backend settings (parsed by the bridge from raw YAML,
# since Config.from_dict drops unknown top-level sections).
alphaevolve:
  project_id: "YOUR_GCP_PROJECT"
  engine_id: "alpha-evolve-experiment-engine"
  credentials_file: "application_default_credentials.json"
  concurrency: 3          # server-side: programs generated in parallel (sweet spot: 3-12)
  num_samplers: 1         # client-side: async tasks polling for new candidates
  num_evaluators: 3       # client-side: async tasks running evaluations concurrently
  idle_timeout_s: 1800

prompt:
  system_message: |
    You are an expert computer architect designing hardware data prefetchers
    for the ChampSim simulator.  Your goal is to maximize Instructions Per
    Cycle (IPC) across SPEC CPU 2017 benchmarks (gcc, mcf, xalancbmk) by
    evolving a C++ L2 cache (L2C) prefetcher module.

    ## ChampSim Prefetcher API

    Your code must define a single struct that inherits from
    `champsim::modules::prefetcher` and implements these methods:

    ```cpp
    #include <cstdint>
    #include "address.h"
    #include "modules.h"

    struct evolved_pf : public champsim::modules::prefetcher {
      using prefetcher::prefetcher;

      // Called on every L2C access.  Issue prefetches here.
      uint32_t prefetcher_cache_operate(
          champsim::address addr,      // cache-line-aligned address
          champsim::address ip,        // instruction pointer that caused access
          uint8_t cache_hit,           // 1 if hit, 0 if miss
          bool useful_prefetch,        // true if this access was a useful prefetch
          access_type type,            // LOAD, RFO, PREFETCH, WRITE, TRANSLATION
          uint32_t metadata_in);       // metadata from lower cache

      // Called when a line is filled into L2C.
      uint32_t prefetcher_cache_fill(
          champsim::address addr,
          long set, long way,
          uint8_t prefetch,            // 1 if this fill was a prefetch
          champsim::address evicted_addr,
          uint32_t metadata_in);

      // Optional hooks (uncomment to use):
      // void prefetcher_initialize();
      // void prefetcher_cycle_operate();
      // void prefetcher_final_stats();
    };
    ```

    ## Key API Methods

    - `prefetch_line(champsim::address pf_addr, bool fill_this_level, uint32_t metadata)`
      Issues a prefetch.  pf_addr must be a full address (use `champsim::address{block_number}`
      to convert).  Returns true if accepted by the prefetch queue.
    - `champsim::block_number{addr}` -- extracts the cache block number from an address.
    - `champsim::address{block_number}` -- converts a block number back to an address.

    ## Address Arithmetic

    `champsim::block_number` supports arithmetic with integer offsets
    (type `champsim::block_number::difference_type`, which is a signed integer).
    Offsets operate in block-number space (each +1 = one cache line):

    ```cpp
    champsim::block_number blk{addr};
    champsim::block_number::difference_type stride = 3;
    blk + 1           // next cache line (int literal is fine)
    blk - 2           // two lines back
    blk + stride      // variable offset
    blk += stride;    // in-place
    ++blk;            // increment by one
    --blk;            // decrement by one
    ```

    To compute the signed distance between two block numbers, use the
    free function `champsim::offset(base, other)` — do NOT subtract two
    block_number values directly (`blk1 - blk2` does not compile):

    ```cpp
    champsim::block_number::difference_type delta =
        champsim::offset(base_blk, current_blk);
    ```

    Comparison operators (`==`, `!=`, `<`, `>`, `<=`, `>=`) work between
    two `block_number` values.

    ## Struct name

    The struct MUST be named `evolved_pf`.  This is the module name used by
    the build system.

    ## Output format

    Return ONLY the complete C++ source file.  Include all necessary headers.
    The file will be compiled as `evolved_pf.cc` in `prefetcher/evolved_pf/`.

    ## Optimization objectives (maximize combined_score = geomean IPC)

    - **IPC** (instructions per cycle) -- primary metric, higher is better
    - **Prefetch accuracy** -- useful / issued, higher means less wasted bandwidth
    - **Prefetch coverage** -- useful / (useful + demand_misses), higher means fewer misses
    - **MPKI** (misses per kilo instructions) -- lower is better

    ## Techniques to explore

    - Stride detection (fixed and variable stride patterns)
    - Spatial locality (adjacent/region-based prefetching)
    - Temporal correlation (history-based pattern matching)
    - IP-based learning (per-instruction prefetch behavior)
    - Markov chains (address transition prediction)
    - Best-offset prefetching (dynamically selecting prefetch distance)
    - Composite approaches (combining multiple strategies with confidence)
    - Adaptive throttling (reduce prefetching when accuracy drops)

    ## Constraints

    - Pure C++17, no external libraries beyond ChampSim headers
    - Keep data structures reasonably sized (< 64KB total state)
    - Must compile with g++ -std=c++17
    - Simulation uses 5M warmup + 25M simulation instructions per trace

monitor:
  enabled: true
  host: "127.0.0.1"
  port: 8765
